# ---------------------------------------------------------------
# Deployment: app-blue
# ---------------------------------------------------------------
# A simple podinfo deployment used for the ArgoCD basics exercise.
# ArgoCD will sync this manifest from the Git repository into
# the Kubernetes cluster.
# ---------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  namespace: workshop
  labels:
    app.kubernetes.io/name: app-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-blue
  template:
    metadata:
      labels:
        app: app-blue
        app.kubernetes.io/name: app-blue
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.11.2
          ports:
            - containerPort: 9898
              name: http
          env:
            - name: PODINFO_UI_COLOR
              value: "#000000"
            - name: PODINFO_UI_MESSAGE
              value: "Deployed with ArgoCD!"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
